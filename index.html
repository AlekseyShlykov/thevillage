<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Before Night Falls</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a2e; }
    #game-container {
      position: relative;
      width: 100%;
      height: 100%;
    }
    #game-canvas {
      display: block;
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
      touch-action: none;
    }
    #ui-overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      color: #e0d8c8;
    }
    #ui-overlay > * { pointer-events: auto; }
    #loading-screen {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #e0d8c8;
    }
    #loading-screen h1 { font-size: 2rem; margin-bottom: 1rem; }
    #loading-screen p { font-size: 1rem; opacity: 0.7; }
    #intro-screen {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 999;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #e0d8c8;
      padding: 24px;
      text-align: center;
    }
    #intro-screen h1 { font-size: 2.2rem; margin-bottom: 2rem; color: #ffe0a0; }
    #intro-screen .intro-text { font-size: 1rem; line-height: 1.7; max-width: 420px; margin-bottom: 0.6rem; opacity: 0.9; }
    #intro-screen .intro-text.intro-lead { font-style: italic; margin-bottom: 1.2rem; }
    #intro-screen .intro-final { margin-top: 1rem; margin-bottom: 2rem; font-size: 1.05rem; }
    #intro-screen .intro-image-placeholder {
      width: 280px;
      height: 160px;
      margin-bottom: 1.5rem;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      object-fit: cover;
    }
    #intro-screen .start-btn {
      padding: 12px 32px;
      font-size: 1.1rem;
      background: rgba(74, 120, 80, 0.9);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      color: #e0d8c8;
      cursor: pointer;
      font-family: inherit;
    }
    #intro-screen .start-btn:hover { background: rgba(90, 140, 96, 0.95); }

    /* Mobile: natural wrap for both bars */
    @media (max-width: 768px) {
      #game-top-bar {
        height: auto !important;
        flex-wrap: wrap;
        padding: 6px 8px;
        gap: 4px 8px;
        font-size: 11px;
      }
      #game-top-bar [data-topbar-stats],
      #game-top-bar [data-topbar-buttons] {
        display: contents !important;
      }
      #game-top-bar [data-season-bar] {
        width: 48px !important;
      }
      #game-top-bar [data-save-btn],
      #game-top-bar [data-load-btn] {
        display: none !important;
      }

      #game-bottom-bar {
        height: auto !important;
        flex-wrap: wrap;
        padding: 6px 8px;
        gap: 6px;
      }
      #game-bottom-bar button {
        min-height: 44px;
        min-width: 44px;
      }
      #game-bottom-bar [data-repair-btn] {
        display: none !important;
      }
    }
  </style>
</head>
<body>
  <div id="loading-screen">
    <h1>Before Night Falls</h1>
    <p>Loading...</p>
  </div>
  <div id="intro-screen" style="display: none;">
    <img src="/assets/intro.png" alt="" class="intro-image-placeholder" width="280" height="160" />
    <h1>Before Night Falls</h1>
    <p class="intro-text intro-lead">Remember that childhood feeling…</p>
    <p class="intro-text">When you stay outside just a little too long.</p>
    <p class="intro-text">When the dark forest is already watching.</p>
    <p class="intro-text">When you run home at the very last moment.</p>
    <p class="intro-text intro-final">This game is about that feeling.</p>
    <button type="button" class="start-btn" id="intro-start-btn">Start game</button>
  </div>
  <div id="game-container">
    <canvas id="game-canvas"></canvas>
    <div id="ui-overlay"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
